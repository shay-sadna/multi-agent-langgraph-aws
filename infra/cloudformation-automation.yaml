AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Multi-Agent Customer Support — Automation Layer (Manual Route).
  Creates IAM roles, Lambda (A2I feedback loop), and EventBridge rule.
  Use this template when you have already created S3 buckets, Knowledge Base,
  Guardrail, and SageMaker A2I manually (שלבים 1-4).

Parameters:
  RandomSuffix:
    Type: String
    Description: >
      Unique 6-character suffix matching the one you used for your S3 buckets
      (e.g. "abc123"). Keeps resource names unique across parallel deployments.
    MinLength: 3
    MaxLength: 10
    AllowedPattern: "[a-z0-9]+"

  DataBucketName:
    Type: String
    Description: Name of the data S3 bucket you created in שלב 1 (e.g. data-bucket-abc123)

  FeedbackBucketName:
    Type: String
    Description: Name of the feedback S3 bucket you created in שלב 1 (e.g. feedback-bucket-abc123)

Resources:

  # ---------------------------------------------------------------
  # IAM Managed Policy: Lambda (A2I completion handler)
  # ---------------------------------------------------------------
  A2ILambdaPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "a2i-lambda-policy-${RandomSuffix}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: "*"
          - Sid: S3FeedbackRead
            Effect: Allow
            Action: s3:GetObject
            Resource: !Sub "arn:${AWS::Partition}:s3:::${FeedbackBucketName}/*"
          - Sid: S3DataWrite
            Effect: Allow
            Action: s3:PutObject
            Resource: !Sub "arn:${AWS::Partition}:s3:::${DataBucketName}/*"
          - Sid: BedrockKBIngestion
            Effect: Allow
            Action:
              - bedrock:StartIngestionJob
              - bedrock:GetIngestionJob
            Resource: "*"

  # ---------------------------------------------------------------
  # IAM Role: Lambda (A2I completion handler)
  # ---------------------------------------------------------------
  A2ILambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "a2i-lambda-role-${RandomSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref A2ILambdaPolicy

  # ---------------------------------------------------------------
  # IAM Managed Policy: App Runner — pull Docker image from ECR
  # ---------------------------------------------------------------
  AppRunnerECRPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "apprunner-ecr-policy-${RandomSuffix}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ECRPullAccess
            Effect: Allow
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:DescribeImages
            Resource: !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/multi-agent-app-${RandomSuffix}"
          - Sid: ECRAuthToken
            Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: "*"

  # ---------------------------------------------------------------
  # IAM Role: App Runner — pull Docker image from ECR
  # ---------------------------------------------------------------
  AppRunnerECRRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "apprunner-ecr-role-${RandomSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref AppRunnerECRPolicy

  # ---------------------------------------------------------------
  # IAM Managed Policy: App Runner instance — runtime AWS permissions
  # ---------------------------------------------------------------
  AppRunnerInstancePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "apprunner-instance-policy-${RandomSuffix}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BedrockAccess
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:Retrieve
              - bedrock:RetrieveAndGenerate
              - bedrock:ApplyGuardrail
              - bedrock-agent-runtime:Retrieve
              - bedrock-agent-runtime:RetrieveAndGenerate
            Resource: "*"
          - Sid: ComprehendAccess
            Effect: Allow
            Action: comprehend:DetectSentiment
            Resource: "*"
          - Sid: A2IAccess
            Effect: Allow
            Action:
              - sagemaker:StartHumanLoop
              - sagemaker-a2i-runtime:StartHumanLoop
              - sagemaker-a2i-runtime:DescribeHumanLoop
            Resource: "*"
          - Sid: S3Access
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${DataBucketName}"
              - !Sub "arn:${AWS::Partition}:s3:::${DataBucketName}/*"
              - !Sub "arn:${AWS::Partition}:s3:::${FeedbackBucketName}"
              - !Sub "arn:${AWS::Partition}:s3:::${FeedbackBucketName}/*"

  # ---------------------------------------------------------------
  # IAM Role: App Runner instance — runtime AWS permissions
  # ---------------------------------------------------------------
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "apprunner-instance-role-${RandomSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref AppRunnerInstancePolicy

  # ---------------------------------------------------------------
  # IAM Managed Policy: SageMaker A2I — write review results to feedback bucket
  # ---------------------------------------------------------------
  SageMakerA2IPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "sagemaker-a2i-policy-${RandomSuffix}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3FeedbackWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${FeedbackBucketName}"
              - !Sub "arn:${AWS::Partition}:s3:::${FeedbackBucketName}/*"

  # ---------------------------------------------------------------
  # IAM Role: SageMaker A2I — used by the Human Review Workflow
  # ---------------------------------------------------------------
  SageMakerA2IRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "sagemaker-a2i-role-${RandomSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
        - !Ref SageMakerA2IPolicy

  # ---------------------------------------------------------------
  # Lambda: A2I Completion Handler
  # Triggered when a human reviewer completes a review in A2I.
  # Reads the answer, writes a new FAQ file to S3, re-syncs the KB.
  # KNOWLEDGE_BASE_ID and DATA_SOURCE_ID start as PLACEHOLDER —
  # update them after the stack deploys (see שלב 5ד).
  # ---------------------------------------------------------------
  A2ICompletionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "a2i-completion-handler-${RandomSuffix}"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt A2ILambdaRole.Arn
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName
          KNOWLEDGE_BASE_ID: "PLACEHOLDER"
          DATA_SOURCE_ID: "PLACEHOLDER"
      Code:
        ZipFile: |
          import json, os, boto3

          s3 = boto3.client("s3")
          bedrock_agent = boto3.client("bedrock-agent")
          DATA_BUCKET = os.environ["DATA_BUCKET"]
          KNOWLEDGE_BASE_ID = os.environ["KNOWLEDGE_BASE_ID"]
          DATA_SOURCE_ID = os.environ["DATA_SOURCE_ID"]

          def handler(event, context):
              detail = event["detail"]
              loop_name = detail["humanLoopName"]
              output_s3_uri = detail["humanLoopOutput"]["outputS3Uri"]
              print(f"Processing completed loop: {loop_name}")

              parts = output_s3_uri.replace("s3://", "").split("/", 1)
              bucket, key = parts[0], parts[1]
              resp = s3.get_object(Bucket=bucket, Key=key)
              data = json.loads(resp["Body"].read())

              question = data["inputContent"]["question"]
              answer = data["humanAnswers"][0]["answerContent"]["human_response"]

              faq_key = f"faq_human_{loop_name}.txt"
              s3.put_object(
                  Bucket=DATA_BUCKET, Key=faq_key,
                  Body=f"Q: {question}\nA: {answer}".encode()
              )
              print(f"FAQ written to s3://{DATA_BUCKET}/{faq_key}")

              resp = bedrock_agent.start_ingestion_job(
                  knowledgeBaseId=KNOWLEDGE_BASE_ID,
                  dataSourceId=DATA_SOURCE_ID
              )
              job_id = resp["ingestionJob"]["ingestionJobId"]
              print(f"KB ingestion started: {job_id}")
              return {"statusCode": 200, "loopName": loop_name, "ingestionJobId": job_id}

  # ---------------------------------------------------------------
  # EventBridge Rule — fires when SageMaker A2I loop completes
  # ---------------------------------------------------------------
  A2IEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "a2i-completion-rule-${RandomSuffix}"
      Description: Triggers A2I completion Lambda when a human review loop finishes
      EventPattern:
        source:
          - aws.sagemaker
        detail-type:
          - "SageMaker A2I HumanLoop Status Change"
        detail:
          humanLoopStatus:
            - "Completed"
      Targets:
        - Arn: !GetAtt A2ICompletionLambda.Arn
          Id: A2ICompletionLambdaTarget

  A2IEventRuleLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref A2ICompletionLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt A2IEventRule.Arn

Outputs:
  A2ILambdaFunctionName:
    Description: Lambda function name (A2I completion handler)
    Value: !Ref A2ICompletionLambda
    Export:
      Name: !Sub "${AWS::StackName}-A2ILambdaFunctionName"

  AppRunnerECRRoleArn:
    Description: IAM Role ARN for App Runner to pull from ECR (use when creating the App Runner service)
    Value: !GetAtt AppRunnerECRRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerECRRoleArn"

  AppRunnerInstanceRoleArn:
    Description: IAM Role ARN for App Runner instance (use when creating the App Runner service)
    Value: !GetAtt AppRunnerInstanceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerInstanceRoleArn"

  SageMakerA2IRoleArn:
    Description: IAM Role ARN for SageMaker A2I Human Review Workflow
    Value: !GetAtt SageMakerA2IRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SageMakerA2IRoleArn"
